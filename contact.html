<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — John Wei</title>
    <meta
      name="description"
      content="Get in touch with John Wei about your project."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="subpage">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="header">
      <nav class="nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="skills.html">Skills</a>
        <a href="experiences.html">Experiences</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </header>

    <main id="main">
      <section class="section contact" aria-labelledby="contact-heading">
        <div class="section-inner">
          <h1 id="contact-heading" class="section-title">Contact</h1>
          <p class="contact-intro">
          </p>
          <form class="contact-form" id="contact-form" novalidate>
            <div class="field">
              <label for="name">Name</label>
              <input
                id="name"
                name="name"
                type="text"
                autocomplete="name"
                required
                placeholder="Your name"
              />
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                required
                placeholder="you@example.com"
              />
            </div>
            <div class="field field-full">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="5"
                required
                placeholder="What are you working on?"
              ></textarea>
            </div>
            <p class="form-error" id="form-error" role="alert" hidden></p>
            <p class="form-success" id="form-success" role="status" hidden>
              Thanks — your message was sent. I typically reply within two
              business days.
            </p>
            <button type="submit" class="btn btn-primary btn-submit">
              Send message
            </button>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer" aria-label="Social profiles">
      <div class="site-footer-inner">
        <a
          class="footer-social-link"
          href="https://www.linkedin.com/in/john-wei-01/"
          target="_blank"
          rel="noopener noreferrer"
          >LinkedIn</a>
        <a
          class="footer-social-link"
          href="https://github.com/john-wei0327/"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
